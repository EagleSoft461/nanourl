# Nginx reverse proxy — staging
#
# Görevleri:
#   1. SSL termination (HTTPS → HTTP to api container)
#   2. Rate limiting (Nginx seviyesinde — uygulama seviyesine ek katman)
#   3. Gzip compression
#   4. Security headers

# Rate limit zone — IP başına
# 10m = 10MB bellek → ~160K IP adresini takip edebilir
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=redirect_limit:10m rate=100r/s;

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name staging.nanourl.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.nanourl.io;

    # SSL — Certbot tarafından yönetilir
    ssl_certificate     /etc/letsencrypt/live/staging.nanourl.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.nanourl.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip — JSON response'ları sıkıştır
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Redirect endpoint (yüksek trafik) ──────────────────────────────────
    location ~* ^/[a-zA-Z0-9_-]{6,20}$ {
        limit_req zone=redirect_limit burst=200 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Auth endpoints ──────────────────────────────────────────────────────
    location /auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health + Metrics (iç ağdan erişilebilir) ───────────────────────────
    location /health {
        proxy_pass http://api:3000;
        access_log off;   # Health check loglarını bastır — gürültü yapar
    }

    location /metrics {
        # Metrics'i dışarıya açma — sadece iç ağdan (Prometheus scrape)
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://api:3000;
    }
}
