# Kubernetes ConfigMap
#
# Ne yapar?
# Hassas olmayan environment değişkenlerini saklar.
# Secret'tan farkı: şifreli değil, düz metin.
# Şifreler, API key'leri → Secret kullan
# Host adları, port numaraları → ConfigMap kullan

apiVersion: v1
kind: ConfigMap
metadata:
  name: nanourl-config
  namespace: default
data:
  NODE_ENV: "production"
  PORT: "3000"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "nanourl"
  POSTGRES_DB: "nanourl"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka-service:9092"
  BASE_URL: "https://api.nanourl.io"
  LOG_LEVEL: "info"

---
# Secret — hassas veriler base64 encode edilmiş olarak saklanır
# NOT: Gerçek production'da bu değerleri buraya yazma!
# Vault, AWS Secrets Manager veya K8s External Secrets kullan
#
# base64 encode: echo -n "değer" | base64
apiVersion: v1
kind: Secret
metadata:
  name: nanourl-secrets
  namespace: default
type: Opaque
data:
  # Bunlar placeholder — gerçek değerlerle değiştir
  postgres-password: c2VjcmV0MTIz  # secret123
  jwt-private-key: ZGV2LXNlY3JldA==  # dev-secret
  jwt-public-key: ZGV2LXNlY3JldA==   # dev-secret
